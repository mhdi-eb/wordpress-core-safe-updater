name: Bash checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: bash -n wp-updater.sh

      - name: Run ShellCheck
        run: shellcheck wp-updater.sh
